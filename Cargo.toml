[workspace]
members = [".", "testkit"]

[package]
name = "harness"
version = "1.6.0"
edition = "2024"
rust-version = "1.94"

[dependencies]
clap = { version = "4.6.0", features = ["derive", "env"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
serde_yml = "0.0.12"
thiserror = "2.0.18"
sha2 = "0.10.9"
hex = "0.4.3"
chrono = { version = "0.4.44", features = ["serde"] }
tempfile = "3.27.0"
tabled = "0.20.0"
uzers = { version = "0.12.2", default-features = false }
shell-words = "1.1.0"
regex = "1.11.1"
tokio = { version = "1.50.0", features = ["rt-multi-thread", "time", "process", "io-util", "sync", "macros"] }
reqwest = { version = "0.13.2", features = ["json"] }
notify = "8.2.0"
backoff = { version = "0.4.0", features = ["tokio"] }
minijinja = "2.17.1"
rayon = "1.11.0"
base64 = "0.22.1"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["chrono", "env-filter"] }
fs2 = "0.4.3"

[dev-dependencies]
assert_cmd = "2.2.0"
predicates = "3.1.4"
tempfile = "3.27.0"
insta = "1.46.3"
harness-testkit = { path = "testkit" }
temp-env = "0.3.6"

[lints.clippy]
pedantic = { level = "deny", priority = 1 }
absolute_paths = { level = "deny", priority = 2 }
cognitive_complexity = { level = "deny", priority = 2 }
needless_pass_by_value = { level = "deny", priority = 2 }
ptr_arg = { level = "deny", priority = 2 }
redundant_clone = { level = "deny", priority = 2 }
unnecessary_to_owned = { level = "deny", priority = 2 }

[lints.rust]
unused = { level = "deny", priority = 1 }
