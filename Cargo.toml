[package]
name = "harness"
version = "0.1.0"
edition = "2024"
rust-version = "1.94"

[dependencies]
clap = { version = "4.6.0", features = ["derive", "env"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
serde_yml = "0.0.12"
thiserror = "2.0.18"
sha2 = "0.10.9"
chrono = { version = "0.4.44", features = ["serde"] }
tempfile = "3.27.0"
comrak = { version = "0.51.0", default-features = false }
tabled = "0.20.0"
libc = "0.2.183"
shell-words = "1.1.0"
regex = "1.11.1"

[dev-dependencies]
assert_cmd = "2.2.0"
predicates = "3.1.4"
tempfile = "3.27.0"
insta = "1.46.3"

[lints.clippy]
pedantic = { level = "deny", priority = 1 }
absolute_paths = { level = "deny", priority = 2 }
