# ---------------------------------------------------------------------------
# Root mise tasks — cargo:local passthrough wrapper
# ---------------------------------------------------------------------------
[filters.harness-mise-cargo-local]
description = "Compact cargo:local output — keep env dumps plus rust diagnostics"
match_command = "^(cargo-local\\.sh|((rtk(\\s+proxy)?\\s+)?(((env\\s+)?[A-Z_][A-Z0-9_]*=[^[:space:]]+\\s+)+)?)?(((sh|bash|zsh|fish)\\b.*?['\"][^'\"]*?))?mise(\\s+run)?\\s+cargo:local)((['\"])?(\\s|$))"
strip_ansi = true
filter_stderr = true
keep_lines_matching = [
  "^[A-Z_]+=",
  "^error(\\[[A-Z0-9]+\\])?:",
  "^warning: ",
  "^note: ",
  "^help: ",
  "^\\s*--> /.*:\\d+:\\d+",
  "^\\s*= (note|help):",
  "^running \\d+ tests?$",
  "^test [^ ]+ \\.\\.\\. FAILED$",
  "^failures:$",
  "^---- .* ----$",
  "^thread '.*' panicked at ",
  "^test result: (ok|FAILED)\\.",
  "^error: test failed,",
  "^error: could not compile ",
  "^failed to prepare writable TMPDIR at ",
]
max_lines = 120
on_empty = "cargo:local: ok"

[[tests.harness-mise-cargo-local]]
name = "keeps env dump"
input = """
CARGO_TARGET_DIR=/Users/x/harness/target/dev/local
CARGO_BUILD_JOBS=4
SESSION_MODE=local
TMPDIR=/var/folders/tmp/
"""
expected = "CARGO_TARGET_DIR=/Users/x/harness/target/dev/local\nCARGO_BUILD_JOBS=4\nSESSION_MODE=local\nTMPDIR=/var/folders/tmp/"

