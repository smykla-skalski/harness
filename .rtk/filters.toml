strip_ansi = true
filter_stderr = true
keep_lines_matching = [
  "^(Hitches|Hangs|CPU|Memory|Launch|Scroll|Frame)\\s",
  "^Threshold ",
  "^Regression ",
  "^error: ",
  "^Error: ",
  "^warning: ",
  "^fatal: ",
  "^\\*\\* ",
  "^✅ ",
  "^❌ ",
  "^💥 ",
  "^Instruments: ",
  "^Saved trace to ",
]
