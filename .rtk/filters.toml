# Root mise tasks — rust / cargo composite lanes
# ---------------------------------------------------------------------------
[filters.harness-mise-rust]
description = "Compact root rust mise lanes — keep diagnostics, failed tests, install results"
match_command = "^((rtk(\\s+proxy)?\\s+)?(((env\\s+)?[A-Z_][A-Z0-9_]*=[^[:space:]]+\\s+)+)?)?(((sh|bash|zsh|fish)\\b.*?['\"][^'\"]*?))?mise(\\s+run)?\\s+(test(?::(unit|integration|slow))?|check(?::agent-assets)?|lint:fix|install|mcp:test)((['\"])?(\\s|$))"
strip_ansi = true
filter_stderr = true
keep_lines_matching = [
  "^version sync check failed:$",
  "^error(\\[[A-Z0-9]+\\])?:",
  "^warning: ",
  "^note: ",
  "^help: ",
  "^\\s*--> /.*:\\d+:\\d+",
  "^\\s*= (note|help):",
  "^running \\d+ tests?$",
  "^test [^ ]+ \\.\\.\\. FAILED$",
  "^failures:$",
  "^---- .* ----$",
  "^thread '.*' panicked at ",
  "^test result: (ok|FAILED)\\.",
