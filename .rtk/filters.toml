  "^Build complete! ",
  "^/.*",
  "^error(\\[[A-Z0-9]+\\])?:",
  "^warning: ",
  "^/.*:\\d+:\\d+:\\s+(error|warning|note):",
  "^\\*\\* (BUILD|TEST|TEST BUILD|CLEAN|ANALYZE) (SUCCEEDED|FAILED|PASSED) \\*\\*$",
  "^\\s*[{\\[}\\],]$",
  "^\\s*\"(jsonrpc|id|result|error|protocolVersion|serverInfo|capabilities|tools|name|description|content|text)\":",
]
max_lines = 140
on_empty = "mcp: ok"

