# ---------------------------------------------------------------------------
# Harness Monitor — apps/harness-monitor-macos quality gate
# ---------------------------------------------------------------------------
[filters.harness-monitor-run-quality-gates]
description = "Compact Harness Monitor quality-gates output (SwiftLint + Swift Format + xcodebuild)"
match_command = "^(run-quality-gates\\.sh|((rtk(\\s+proxy)?\\s+)?(((env\\s+)?[A-Z_][A-Z0-9_]*=[^[:space:]]+\\s+)+)?)?(((sh|bash|zsh|fish)\\b.*?['\"][^'\"]*?))?mise(\\s+run)?\\s+monitor:macos:lint)((['\"])?(\\s|$))"
strip_ansi = true
filter_stderr = true
keep_lines_matching = [
  # SwiftLint / Swift Format findings (path:line:col: severity: message)
  "^/.*\\.swift:\\d+:\\d+:\\s+(error|warning|note):",
  # Compiler diagnostics
  "^/.*:\\d+:\\d+:\\s+(error|warning|note):",
  # XCUITest results
  "^Test (Suite|Case) ",
  "^Executed \\d+ tests?,",
  "^\\s+XCTAssert",
  "^\\s+failed - ",
  # Build verdict + test verdict
  "^\\*\\* (BUILD|TEST|TEST BUILD|CLEAN|ANALYZE) (SUCCEEDED|FAILED|PASSED) \\*\\*$",
  # Sandbox / quality gate harness output
  "^=== Sandbox violations detected ===$",
  "^Sandbox violation:",
  # Entitlement / bundle checks emitted by the shell script
  "^swift is required on PATH$",
  "^swiftlint is required on PATH$",
  "^xcodebuild runner is not executable: ",
  "^generate-project script is not executable: ",
  "^missing .* entitlement:",
  "^daemon still has temporary-exception entitlement$",
  "^daemon missing user-selected.read-write$",
  "^daemon missing bookmarks.app-scope$",
  "^built app missing at ",
  "^daemon binary missing at ",
  "^swift-compile-context:",
  "^error: ",
  "^warning: ",
  "^fatal: ",
  # SwiftFormat diffs (keep only the change header)
  "^[-+]{3} ",
  # Script-level verdict lines
  "^✅ ",
  "^❌ ",
  "^💥 ",
]
truncate_lines_at = 240
head_lines = 20
tail_lines = 20
max_lines = 50
on_empty = "run-quality-gates: ok"

