# Project-local RTK filters — commit this file with your repo.
# Filters here override user-global and built-in filters.
# Docs: https://github.com/rtk-ai/rtk#custom-filters
#
# Activation: TOML filters fire when a command flows through the `rtk` binary.
# The Claude Code hook auto-wraps certain commands (xcodebuild, cargo, git, ...).
# Scripts are matched by basename (so `rtk Scripts/run-quality-gates.sh` activates
# the `harness-monitor-run-quality-gates` filter).
#
# Task filters intentionally accept these CLI shapes:
# - `mise run <task>`
# - `mise <task>`
# - env-prefixed variants like `env KEY=value mise run <task>` or `KEY=value mise <task>`
# - shell-wrapped variants like `bash -lc 'mise run <task>'` or `fish --login -c 'mise <task>'`
# - combined wrappers like `rtk env KEY=value zsh -o no_nomatch -c 'mise <task>'`
# - shell prelude variants like `rtk bash -lc 'set -o pipefail; mise run <task>'`
# - proxy variants like `rtk proxy env KEY=value mise run <task>'`
#
# Task-family coverage:
# - check:stale / clean:stale -> harness-mise-stale-state
# - version:* -> harness-mise-version
# - check:scripts -> harness-mise-check-scripts
# - cargo:env -> harness-mise-cargo-env
# - cargo:local -> harness-mise-cargo-local
# - check / test / install / mcp:test -> harness-mise-rust
# - monitor:macos:* / preview:* -> monitor-specific filters below
# - observability:* -> harness-mise-observability
# - host-metrics:* -> harness-mise-host-metrics
# - mcp:* composite lanes -> harness-mise-mcp
schema_version = 1

# ---------------------------------------------------------------------------
# Root mise tasks — stale-state preflight / cleanup
# ---------------------------------------------------------------------------
[filters.harness-mise-stale-state]
description = "Compact stale-state mise tasks — keep actionable failures and cleanup actions"
match_command = "^((rtk(\\s+proxy)?\\s+)?(((env\\s+)?[A-Z_][A-Z0-9_]*=[^[:space:]]+\\s+)+)?)?(((sh|bash|zsh|fish)\\b.*?['\"][^'\"]*?))?mise(\\s+run)?\\s+(check:stale|clean:stale)((['\"])?(\\s|$))"
strip_ansi = true
filter_stderr = true
keep_lines_matching = [
  "^error: dev state is stale$",
  "^  - ",
  "^run 'mise run clean:stale' to reset$",
  "^(killing|quitting|stopping|force-stopping|removing|wiping)\\b",
  "^  wiped \\d+ bridge artifact\\(s\\) in ",
  "^clean:stale complete$",
  "^error: ",
  "^warning: ",
]
max_lines = 80
on_empty = "stale-state: ok"

[[tests.harness-mise-stale-state]]
name = "keeps stale failure bullets"
input = """
error: dev state is stale
  - stale /tmp bridge sockets: /tmp/h-bridge-a.sock
  - orphan local debug harness processes: 1234
run 'mise run clean:stale' to reset
"""
expected = "error: dev state is stale\n  - stale /tmp bridge sockets: /tmp/h-bridge-a.sock\n  - orphan local debug harness processes: 1234\nrun 'mise run clean:stale' to reset"

[[tests.harness-mise-stale-state]]
name = "keeps cleanup actions"
input = """
quitting Harness Monitor app...
stopping launchd daemon io.harnessmonitor.daemon...
removing 2 stale /tmp bridge socket(s)...
wiping stale bridge state files...
  wiped 1 bridge artifact(s) in /Users/x/Library/Application Support/harness/daemon
clean:stale complete
"""
expected = "quitting Harness Monitor app...\nstopping launchd daemon io.harnessmonitor.daemon...\nremoving 2 stale /tmp bridge socket(s)...\nwiping stale bridge state files...\n  wiped 1 bridge artifact(s) in /Users/x/Library/Application Support/harness/daemon\nclean:stale complete"

[[tests.harness-mise-stale-state]]
name = "empty returns on_empty"
input = ""
expected = "stale-state: ok"

# ---------------------------------------------------------------------------
# Root mise tasks — version surfaces
# ---------------------------------------------------------------------------
[filters.harness-mise-version]
description = "Compact version mise tasks — keep semver output and sync mismatches"
match_command = "^((rtk(\\s+proxy)?\\s+)?(((env\\s+)?[A-Z_][A-Z0-9_]*=[^[:space:]]+\\s+)+)?)?(((sh|bash|zsh|fish)\\b.*?['\"][^'\"]*?))?mise(\\s+run)?\\s+version:(show|set|sync|sync:monitor|check)((['\"])?(\\s|$))"
strip_ansi = true
filter_stderr = true
keep_lines_matching = [
  "^[0-9]+\\.[0-9]+\\.[0-9]+([-.][0-9A-Za-z.-]+)?$",
  "^version sync check failed:$",
  "^  - ",
  "^invalid version: ",
  "^show does not accept arguments$",
  "^check does not accept arguments$",
  "^sync does not accept arguments$",
  "^sync-monitor does not accept arguments$",
  "^set requires exactly one version argument$",
]
max_lines = 80
on_empty = "version: ok"

[[tests.harness-mise-version]]
name = "keeps canonical version output"
input = "0.3.1\n"
expected = "0.3.1"

[[tests.harness-mise-version]]
name = "keeps sync mismatch bullets"
input = """
version sync check failed:
  - testkit/Cargo.toml version 0.3.0 != Cargo.toml version 0.3.1
  - apps/harness-monitor-macos/project.yml MARKETING_VERSION 0.3.0 != Cargo.toml version 0.3.1
"""
expected = "version sync check failed:\n  - testkit/Cargo.toml version 0.3.0 != Cargo.toml version 0.3.1\n  - apps/harness-monitor-macos/project.yml MARKETING_VERSION 0.3.0 != Cargo.toml version 0.3.1"

[[tests.harness-mise-version]]
name = "empty returns on_empty"
input = ""
expected = "version: ok"

# ---------------------------------------------------------------------------
# Root mise tasks — script lint / syntax
# ---------------------------------------------------------------------------
[filters.harness-mise-check-scripts]
description = "Compact check:scripts output — keep shellcheck and python diagnostics"
match_command = "^((rtk(\\s+proxy)?\\s+)?(((env\\s+)?[A-Z_][A-Z0-9_]*=[^[:space:]]+\\s+)+)?)?(((sh|bash|zsh|fish)\\b.*?['\"][^'\"]*?))?mise(\\s+run)?\\s+check:scripts((['\"])?(\\s|$))"
strip_ansi = true
filter_stderr = true
keep_lines_matching = [
  "^In /.* line \\d+:$",
  "^/.*:\\d+:\\d+: ",
  "^\\s*\\^-- ",
  "^Did you mean:$",
  "^SyntaxError: ",
  "^Sorry: ",
  "^Traceback \\(most recent call last\\):$",
  "^  File \".*\", line \\d+",
  "^error: ",
  "^warning: ",
]
max_lines = 80
on_empty = "check:scripts: ok"

[[tests.harness-mise-check-scripts]]
name = "keeps shellcheck finding"
input = """
In /Users/x/scripts/foo.sh line 7:
echo $x
     ^-- SC2086 (info): Double quote to prevent globbing and word splitting.

Did you mean:
echo "$x"
"""
expected = "In /Users/x/scripts/foo.sh line 7:\n     ^-- SC2086 (info): Double quote to prevent globbing and word splitting.\nDid you mean:"

[[tests.harness-mise-check-scripts]]
name = "keeps python syntax error"
input = """
Traceback (most recent call last):
  File "/Users/x/scripts/bar.py", line 12
SyntaxError: invalid syntax
"""
expected = "Traceback (most recent call last):\n  File \"/Users/x/scripts/bar.py\", line 12\nSyntaxError: invalid syntax"

[[tests.harness-mise-check-scripts]]
name = "empty returns on_empty"
input = ""
expected = "check:scripts: ok"

