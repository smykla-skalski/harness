name: session:join
description: >-
  Join a multi-agent session. Default role is worker. Use --role observer to monitor
  and triage, or --role reviewer/improver for review work.
argument-hint: '[session-id] [--role worker|observer|reviewer|improver] [--runtime claude|codex|gemini|copilot|opencode] [--capabilities "x,y"]'
allowed-tools: Agent, AskUserQuestion, Bash, Edit, Glob, Grep, Read, Write
user-invocable: true
direct-skill-name: harness:session:join
