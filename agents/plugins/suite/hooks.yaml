{
  "hooks": {
    "PreCompact": [
      {
        "matcher": "manual|auto",
        "hooks": [
          {
            "type": "command",
            "command": "${CLAUDE_PLUGIN_ROOT}/harness pre-compact --project-dir \"$CLAUDE_PROJECT_DIR\""
          }
        ]
      }
    ],
    "SessionStart": [
      {
        "matcher": "startup|resume|clear|compact",
        "hooks": [
          {
            "type": "command",
            "command": "${CLAUDE_PLUGIN_ROOT}/harness agents session-start --agent claude --project-dir \"$CLAUDE_PROJECT_DIR\""
          }
        ]
      }
    ],
    "Stop": [
      {
        "matcher": ".*",
        "hooks": [
          {
            "type": "command",
            "command": "${CLAUDE_PLUGIN_ROOT}/harness agents session-stop --agent claude --project-dir \"$CLAUDE_PROJECT_DIR\""
          }
        ]
      }
    ]
  }
}
