---
# yaml-language-server: $schema=https://raw.githubusercontent.com/smykla-skalski/.github/main/schemas/sync-config.schema.json
# Harness-specific overrides deep-merged onto the org-wide renovate.json.
# Without this file the org sync replaces renovate.json wholesale, dropping the
# Saturday schedule and any repo-local package rules.
sync:
  files:
    merge:
      - path: "renovate.json"
        strategy: "deep-merge"
        arrayStrategies:
          "$.packageRules": "append"
        overrides:
          timezone: "Europe/Warsaw"
          schedule:
            - "* 4 * * 6"
          packageRules:
            # The codex-acp workspace is a vendored adapter whose dependency graph
            # is fixed by the pinned codex rust-v0.137.0 and zed codex-acp v0.16.0
            # tags. Lock file maintenance floats transitive crates (e.g. rmcp) that
            # the pinned codex code fails to build against, so keep its lock frozen.
            - description: "Freeze the vendored codex-acp workspace lock; its deps are pinned to codex rust-v0.137.0 / zed codex-acp v0.16.0"
              matchFileNames:
                - "crates/harness-codex-acp/Cargo.toml"
              lockFileMaintenance:
                enabled: false
