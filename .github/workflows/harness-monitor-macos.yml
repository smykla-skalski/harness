name: Harness Monitor

on:
  pull_request:
    paths:
      - ".github/workflows/harness-monitor-macos.yml"
      - ".mise.toml"
      - "apps/harness-monitor-macos/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/harness-monitor-macos.yml"
      - ".mise.toml"
      - "apps/harness-monitor-macos/**"
  workflow_dispatch:

jobs:
  harness:
    name: Harness Monitor Quality Gates
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Tuist
        run: brew install tuist

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Run Harness Monitor quality gates and tests
        run: apps/harness-monitor-macos/Scripts/test-swift.sh
