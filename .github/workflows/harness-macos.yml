name: AI Harness

on:
  pull_request:
    paths:
      - ".github/workflows/harness-macos.yml"
      - ".mise.toml"
      - "apps/harness-macos/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/harness-macos.yml"
      - ".mise.toml"
      - "apps/harness-macos/**"
  workflow_dispatch:

jobs:
  harness:
    name: AI Harness Quality Gates
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Run AI Harness quality gates and tests
        run: apps/harness-macos/Scripts/test-swift.sh
