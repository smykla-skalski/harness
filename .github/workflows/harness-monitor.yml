name: Harness Monitor

on:
  pull_request:
    paths:
      - ".github/workflows/harness-monitor.yml"
      - ".mise.toml"
      - "apps/harness-monitor/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/harness-monitor.yml"
      - ".mise.toml"
      - "apps/harness-monitor/**"
  workflow_dispatch:

jobs:
  harness:
    name: Harness Monitor Quality Gates
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Tuist
        run: brew install tuist

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Run Harness Monitor quality gates and tests
        run: apps/harness-monitor/Scripts/test-swift.sh
