[tools]
# Must match `rust-toolchain.toml` so mise's `RUSTUP_TOOLCHAIN` export and
# rustup's toolchain-file resolution agree. Mismatch invalidates the daemon
# cargo cache on every context switch.
rust = "nightly-2026-05-19"
shellcheck = "0.11.0"
tuist = "4.195.0"
xcbeautify = "3.2.1"

[env]
HARNESS_APP_GROUP_ID = "Q498EB36N4.io.harnessmonitor"

[tasks."check:stale"]
description = "Fail fast if the dev environment has stale processes, /tmp bridge sockets, or non-approved DerivedData HarnessMonitor bundles"
run = "./scripts/check-no-stale-state.sh"

[tasks."clean:stale"]
description = "Safely scrub stale dev state without quitting Harness Monitor or stopping live daemon work"
run = "./scripts/clean-stale-state.sh"

[tasks."clean:stale:full"]
description = "Quit Harness Monitor and stop live daemon work while resetting stale shared dev state"
run = "HARNESS_STALE_CLEANUP_ALLOW_LIVE_RESET=1 ./scripts/clean-stale-state.sh"

[tasks."clean:launch-services"]
description = "Unregister stale Launch Services entries for Harness Monitor app bundles whose on-disk path is gone (prevents the dead-registration buildup that makes BTM fail to resolve the managed daemon container). Live builds are never touched"
run = "./scripts/clean-stale-launch-services.sh"

[tasks."clean:launch-services:dry-run"]
description = "Preview clean:launch-services: report stale Harness Monitor Launch Services registrations without removing any"
run = "./scripts/clean-stale-launch-services.sh --dry-run"

[tasks."clean:caches"]
description = "Reclaim disk by removing repo Rust targets, daemon Cargo target, Xcode derived roots, SwiftPM .build dirs, repo tmp, and global build caches (pass --dry-run, --aggressive, or --force/-f to also remove ms-playwright cache after --)"
run = "./scripts/clean-build-caches.sh"

[tasks."clean:lanes"]
description = "Drop stale shared build lanes and linked worktrees from the git-common-root while preserving active/current/main caches (pass --dry-run, --keep LANE, --hours N, --worktree-hours N after --)."
run = "./scripts/clean-stale-lanes.sh"

[tasks."clean:lanes:dry-run"]
description = "Preview clean:lanes: classify shared build lanes and linked worktrees as keep/drop with size; delete nothing"
run = "./scripts/clean-stale-lanes.sh --dry-run"

[tasks."clean:fsmonitor"]
description = "List orphan and redundant-duplicate git fsmonitor--daemon processes and SIGTERM them. Live single-daemon-per-gitdir processes are never killed."
run = "./scripts/clean-stale-fsmonitor.sh --apply"

[tasks."clean:fsmonitor:dry-run"]
description = "Preview clean:fsmonitor: report each fsmonitor daemon's gitdir and status (live/orphan/redundant/unknown); send no signals"
run = "./scripts/clean-stale-fsmonitor.sh"

[tasks."clean:fsmonitor:disable-dormant"]
description = "Set local core.fsmonitor=false on git repos untouched > 30 days so they stop spawning fsmonitor daemons. Excludes harness/kuma/kong-mesh/plugins/dotfiles/codex-home."
run = "./scripts/disable-fsmonitor-dormant.sh --apply"

[tasks."clean:fsmonitor:disable-dormant:dry-run"]
description = "Preview clean:fsmonitor:disable-dormant: list dormant repos whose effective core.fsmonitor would be flipped to false; write no config"
run = "./scripts/disable-fsmonitor-dormant.sh"

[tasks."clean:fsmonitor:schedule"]
description = "Install a weekly launchd agent (~/Library/LaunchAgents/) that runs clean:fsmonitor and clean:fsmonitor:disable-dormant every Sunday at 03:15 local"
run = "./scripts/launchd-fsmonitor-install.sh install"

[tasks."clean:fsmonitor:schedule:remove"]
description = "Bootout and remove the weekly fsmonitor cleanup launchd agent"
run = "./scripts/launchd-fsmonitor-install.sh remove"

[tasks."clean:fsmonitor:schedule:status"]
description = "Print whether the weekly fsmonitor cleanup launchd agent is loaded and list the most recent run logs"
run = "./scripts/launchd-fsmonitor-install.sh status"

[tasks."clean:caches:dry-run"]
description = "Preview clean:caches: print every target and its size; delete nothing"
run = "./scripts/clean-build-caches.sh --dry-run"

[tasks."clean:caches:aggressive"]
description = "clean:caches plus Xcode UI HarnessMonitor-* DerivedData slots and Xcode module/compilation caches (loses SourcePackages cache; full regen)"
run = "./scripts/clean-build-caches.sh --aggressive"

[tasks."clean:system"]
description = "Reclaim disk by garbage-collecting nix, deleting stale Simulator runtimes (iOS<26, watchOS<26, duplicate majors), Xcode testmanagerd Daemon Containers, and Xcode CompilationCache (pass --dry-run after --)"
run = "./scripts/clean-system-state.sh"

[tasks."clean:system:dry-run"]
description = "Preview clean:system: list every Simulator runtime, Daemon Container, and Xcode cache that would be removed; delete nothing"
run = "./scripts/clean-system-state.sh --dry-run"

[tasks."clean:disk"]
description = "Run the normal disk cleanup sweep: clean:caches followed by clean:system"
run = [
  "./scripts/clean-build-caches.sh",
  "./scripts/clean-system-state.sh",
]

[tasks."clean:disk:dry-run"]
description = "Preview the normal disk cleanup sweep: clean:caches:dry-run followed by clean:system:dry-run"
run = [
  "./scripts/clean-build-caches.sh --dry-run",
  "./scripts/clean-system-state.sh --dry-run",
]

[tasks."clean:repos:cold"]
description = "Audit and delete cold non-harness repos (kong, bartsmykla, klab, kubernetes-manifests, JetBrains) - skips any root with dirty trees, unpushed commits, or untracked branches (pass --dry-run or --root PATH after --)"
run = "./scripts/clean-cold-repos.sh"

[tasks."clean:repos:cold:dry-run"]
description = "Preview clean:repos:cold: report each root's size and any safety blockers; delete nothing"
run = "./scripts/clean-cold-repos.sh --dry-run"

[tasks."clean:repos:cold:skip-vendored"]
description = "clean:repos:cold ignoring cargo/go/npm vendored checkouts (tmp/cargo/git/checkouts, .cargo/git/checkouts, go/pkg/mod/cache, node_modules) whose dirty state is normal"
run = "./scripts/clean-cold-repos.sh --skip-vendored"

[tasks."clean:repos:cold:skip-vendored:dry-run"]
description = "Preview clean:repos:cold:skip-vendored: same blockers as default minus vendored false positives"
run = "./scripts/clean-cold-repos.sh --skip-vendored --dry-run"

[tasks."version:show"]
description = "Print the canonical harness package version"
run = "./scripts/version.sh show"

[tasks."version:set"]
description = "Update Cargo.toml to the requested version and sync all derived version surfaces (pass the version after --)"
run = "./scripts/version.sh set"

[tasks."version:sync"]
description = "Sync all derived version surfaces from Cargo.toml"
run = "./scripts/version.sh sync"

[tasks."version:sync:monitor"]
description = "Sync only the Harness Monitor derived version surfaces from Cargo.toml"
run = "./scripts/version.sh sync-monitor"

[tasks."version:check"]
description = "Verify all derived version surfaces are in sync"
run = "./scripts/version.sh check"

[tasks."check:scripts"]
description = "Run shell and Python script lint plus syntax checks for repo-local helpers"
run = "./scripts/check-scripts.sh"

[tasks."test:unit"]
description = "Run unit tests"
run = "./scripts/cargo-local.sh test --quiet --lib -- --format terse"

[tasks."test:integration"]
description = "Run integration tests (fast only, single-threaded for env safety)"
run = "./scripts/cargo-local.sh test --quiet --test integration -- --test-threads=1 --format terse"

[tasks."test:slow"]
description = "Run ignored slow tests (fake toolchain, ENV_LOCK)"
run = "./scripts/cargo-local.sh test --quiet --test integration -- --ignored --test-threads=1 --format terse"

[tasks.test]
description = "Run all fast tests"
depends = ["test:unit", "test:integration"]

[tasks."check:agent-assets"]
description = "Verify generated agent assets are in sync with sources"
run = "./scripts/cargo-local.sh run --quiet -- setup agents generate --check"

[tasks."setup:agents:generate"]
description = "Render shared agent assets from canonical sources (pass harness setup args after --)"
run = "./scripts/cargo-local.sh run --quiet -- setup agents generate"

[tasks."setup:bootstrap"]
description = "Write runtime bootstrap configs and managed agent outputs (pass harness setup args after --)"
run = "./scripts/cargo-local.sh run --quiet -- setup bootstrap"

[tasks."aff:check:agent-assets"]
description = "Verify aff-owned runtime hook patches are in sync with current runtime configs"
run = "./scripts/cargo-local.sh run --quiet -p aff -- setup agents generate --check"

[tasks."harness:check"]
description = "Run harness-only quality gates (without aff package checks)"
run = [
  "./scripts/check-no-stale-state.sh",
  "./scripts/version.sh check",
  "./scripts/check-scripts.sh",
  "./scripts/cargo-local.sh check -p harness",
  "./scripts/cargo-local.sh clippy -p harness --lib",
  "./scripts/cargo-local.sh run --quiet -- setup agents generate --check",
]

[tasks."aff:check"]
description = "Run aff-only quality gates"
run = [
  "./scripts/cargo-local.sh check -p aff",
  "./scripts/cargo-local.sh clippy -p aff --all-targets",
]

[tasks."aff:setup:agents:generate"]
description = "Patch aff-owned runtime hooks into existing runtime configs (pass aff setup args after --)"
run = "./scripts/cargo-local.sh run --quiet -p aff -- setup agents generate"

[tasks."aff:setup:bootstrap"]
description = "Patch aff-owned runtime hooks into existing bootstrap configs (pass aff setup args after --)"
run = "./scripts/cargo-local.sh run --quiet -p aff -- setup bootstrap"

[tasks.check]
description = "Run default harness quality gates; run aff:check manually when needed"
depends = ["harness:check"]

[tasks."lint:fix"]
description = "Format and apply clippy fixes"
run = ["./scripts/cargo-local.sh fmt", "./scripts/cargo-local.sh clippy --fix --allow-dirty --allow-staged"]

[tasks.install]
description = "Build and install both harness and aff"
depends = ["harness:install", "aff:install"]

[tasks."harness:install"]
description = "Build the harness binary, sign it, install it to ~/.local/bin, reconcile stale shadowed harness binaries on PATH, and validate the installed binary"
run = [
  "./scripts/cargo-local.sh build --release --features tokio-console",
  "./scripts/cargo-local.sh build --release --manifest-path crates/harness-codex-acp/Cargo.toml",
  "./scripts/cargo-local.sh build --release --manifest-path crates/harness-openrouter-agent/Cargo.toml",
  "./scripts/install-harness-release.sh",
]

[tasks."aff:install"]
description = "Build the aff binary, sign it, install it to ~/.local/bin, and validate the installed binary"
run = [
  "./scripts/cargo-local.sh build --release -p aff",
  "./scripts/install-aff-release.sh",
]

[tasks."aff:test"]
description = "Run aff package tests only"
run = "./scripts/cargo-local.sh test --quiet -p aff"

[tasks."cargo:local"]
description = "Run cargo through the shared local wrapper (pass cargo args after --)"
run = "./scripts/cargo-local.sh"

[tasks."cargo:env"]
description = "Print the local cargo wrapper environment used by mise tasks"
run = "./scripts/cargo-local.sh --print-env"

[tasks."monitor:generate"]
description = "Generate the Harness Monitor macOS Xcode project via Tuist"
run = "apps/harness-monitor/Scripts/generate.sh"

[tasks."monitor:generate:force"]
description = "Force regenerate the Harness Monitor macOS Xcode project via Tuist"
run = "HARNESS_MONITOR_FORCE_GENERATE=1 apps/harness-monitor/Scripts/generate.sh"

[tasks."monitor:debug:attributegraph"]
description = "Attach LLDB to a running Harness Monitor process and break on AttributeGraph cycle logging (pass -- --pid <pid> or --process-name <name>)"
run = "apps/harness-monitor/Scripts/attach-attributegraph-breakpoint.sh"

[tasks."monitor:xcodebuild"]
description = "Run the Harness Monitor xcodebuild lane wrapper (pass xcodebuild args after --)"
run = "apps/harness-monitor/Scripts/monitor-xcodebuild.sh"

[tasks."monitor:build"]
description = "Build the Harness Monitor macOS app (Debug) via the shared build lane"
run = "apps/harness-monitor/Scripts/monitor-xcodebuild.sh -workspace apps/harness-monitor/HarnessMonitor.xcworkspace -scheme HarnessMonitor -configuration Debug -destination \"platform=macOS,arch=$(uname -m),name=My Mac\" -skipPackagePluginValidation build CODE_SIGNING_ALLOWED=NO"

[tasks."monitor"]
description = "Build and launch the Harness Monitor macOS app (Debug)"
depends = ["monitor:build"]
run = '''
  set -euo pipefail
  checkout_root="$(git rev-parse --show-toplevel)"
  source "$checkout_root/scripts/lib/common-repo-root.sh"
  source "$checkout_root/apps/harness-monitor/Scripts/lib/monitor-lanes.sh"
  common_repo_root="$(resolve_common_repo_root "$checkout_root")"
  app_path="$(harness_monitor_build_derived_data_path "$common_repo_root")/Build/Products/Debug/Harness Monitor.app"
  if [[ ! -d "$app_path" ]]; then
    printf 'error: Built app not found: %s\n' "$app_path" >&2
    exit 1
  fi
  open "$app_path"
'''

[tasks."monitor:build:release"]
description = "Build the Harness Monitor macOS app (Release, signed) via the shared build lane"
run = "apps/harness-monitor/Scripts/monitor-xcodebuild.sh -workspace apps/harness-monitor/HarnessMonitor.xcworkspace -scheme HarnessMonitor -configuration Release -destination \"platform=macOS,arch=$(uname -m),name=My Mac\" -skipPackagePluginValidation build"

[tasks."monitor:release:external"]
description = "Generate, build, and launch the signed Release Harness Monitor app in external-daemon mode"
depends = ["monitor:generate", "monitor:build:release"]
run = '''
  set -euo pipefail
  checkout_root="$(git rev-parse --show-toplevel)"
  source "$checkout_root/scripts/lib/common-repo-root.sh"
  source "$checkout_root/apps/harness-monitor/Scripts/lib/monitor-lanes.sh"
  common_repo_root="$(resolve_common_repo_root "$checkout_root")"
  app_path="$(harness_monitor_build_derived_data_path "$common_repo_root")/Build/Products/Release/Harness Monitor.app"
  if [[ ! -d "$app_path" ]]; then
    printf 'error: Built app not found: %s\n' "$app_path" >&2
    exit 1
  fi
  defaults write io.harnessmonitor.app HarnessMonitor.DaemonOwnership -string external
  printf 'Launching signed Release app in external-daemon mode: %s\n' "$app_path"
  open -na "$app_path"
'''

[tasks."monitor:lint"]
description = "Run the strict non-build Swift format and SwiftLint checks for the Harness Monitor macOS app"
run = "apps/harness-monitor/Scripts/run-lint.sh"

[tasks."monitor:quality-gate"]
description = "Run the slower build-based sandbox and daemon quality gates for the Harness Monitor macOS app"
run = "apps/harness-monitor/Scripts/run-quality-gates.sh"

[tasks."monitor:test"]
description = "Build-for-testing and test the Harness Monitor macOS app (set XCODE_ONLY_TESTING for focused selectors)"
run = "apps/harness-monitor/Scripts/test-swift.sh"

[tasks."monitor:test:scripts"]
description = "Run the Harness Monitor Instruments/parser Python regression tests"
run = "find apps/harness-monitor/Scripts/tests -name '__pycache__' -type d -prune -exec rm -rf {} + && env -i HOME=\"$HOME\" PATH=\"$PATH\" TMPDIR=\"${TMPDIR:-/tmp}\" HARNESS_APP_GROUP_ID=\"${HARNESS_APP_GROUP_ID:-Q498EB36N4.io.harnessmonitor}\" PYTHONDONTWRITEBYTECODE=1 python3 -m unittest discover -s apps/harness-monitor/Scripts/tests -p 'test_*.py'"

[tasks."monitor:runtime"]
description = "Print the current Harness Monitor runtime lane, daemon root, Codex port, launchd label, and MCP socket"
run = "apps/harness-monitor/Scripts/monitor-runtime-env.sh"

[tasks."monitor:reset"]
description = "Quit Harness Monitor and reset current-lane stale bridge/daemon state"
run = "HARNESS_STALE_CLEANUP_ALLOW_LIVE_RESET=1 apps/harness-monitor/Scripts/monitor-runtime-env.sh ./scripts/clean-stale-state.sh"

[tasks."monitor:daemon:dev"]
description = "Run `harness daemon dev` with the current Harness Monitor runtime lane"
env = { RUST_LOG = "harness=trace,agent_client_protocol=trace,tokio_tungstenite=debug,info,runtime=warn,tokio=warn,pyroscope=warn,pyroscope_pprofrs=warn,h2=warn,hyper=warn,hyper_util=warn,tower=warn,reqwest=warn,sqlx=warn" }
run = "apps/harness-monitor/Scripts/run-daemon-dev.sh"

[tasks."monitor:bridge:start"]
description = "Run `harness bridge start` with the current Harness Monitor runtime lane"
env = { RUST_LOG = "harness=trace,agent_client_protocol=trace,tokio_tungstenite=debug,info,runtime=warn,tokio=warn,pyroscope=warn,pyroscope_pprofrs=warn,h2=warn,hyper=warn,hyper_util=warn,tower=warn,reqwest=warn,sqlx=warn" }
run = "apps/harness-monitor/Scripts/run-bridge-start.sh"

[tasks."monitor:xcodebuildmcp"]
description = "Run xcodebuildmcp with the current Harness Monitor runtime lane socket (pass xcodebuildmcp args after --)"
run = "apps/harness-monitor/Scripts/monitor-runtime-env.sh xcodebuildmcp"

[tasks."monitor:mcp"]
description = "Start an xcodebuildmcp MCP server with the current Harness Monitor runtime lane socket"
run = "apps/harness-monitor/Scripts/monitor-runtime-env.sh xcodebuildmcp mcp"

[tasks."monitor:tools:build:e2e"]
description = "Build the Harness Monitor agents e2e helper Swift CLI (release)"
run = "swift build -c release --package-path apps/harness-monitor/Tools/HarnessMonitorE2E"

[tasks."monitor:tools:test:e2e"]
description = "Run unit tests for the agents e2e helper Swift CLI"
run = "swift test --package-path apps/harness-monitor/Tools/HarnessMonitorE2E"

[tasks."monitor:test:agents-e2e"]
description = "Run the explicit Harness Monitor Agents end-to-end UI lane"
depends = ["monitor:tools:build:e2e"]
run = "apps/harness-monitor/Scripts/test-agents-e2e.sh"

[tasks."monitor:test:swarm-e2e"]
description = "Run the single-scenario Harness Monitor swarm e2e lane"
depends = ["monitor:tools:build:e2e"]
run = "apps/harness-monitor/Scripts/test-swarm-e2e.sh"

[tasks."e2e:swarm:full"]
description = "Real-runtime 16-act swarm full flow orchestrator"
depends = ["monitor:tools:build:e2e"]
run = "scripts/e2e/swarm-full-flow.sh"

[tasks."e2e:swarm:inject-heuristic"]
description = "Append deterministic transcript lines to trigger observer heuristics"
depends = ["monitor:tools:build:e2e"]
run = "scripts/e2e/inject-heuristic-log.sh"

[tasks."e2e:swarm:seed"]
description = "Pre-seed data home to bypass onboarding"
depends = ["monitor:tools:build:e2e"]
run = "scripts/e2e/seed-session-state.sh"

[tasks."e2e:swarm:probe-runtimes"]
description = "Probe availability of each runtime; emit JSON"
depends = ["monitor:tools:build:e2e"]
run = "scripts/e2e/probe-runtimes.sh"

[tasks."e2e:swarm:gaps-open"]
description = "Print count of open gap rows in docs/e2e/swarm-gaps.md"
run = "./scripts/e2e/gaps-open-count.sh"

[tasks."e2e:swarm:clean:recordings"]
description = "Remove stale e2e triage run dirs (pass --before-hours <N> to set the age threshold; default 24h)"
run = "./scripts/e2e/clean-recordings.sh"

[tasks."e2e:swarm:triage:recording"]
description = "Run every universal recording-triage detector against a triage run dir (positional <run-dir>)"
depends = ["monitor:tools:build:e2e"]
run = "./scripts/e2e/recording-triage/run-all.sh"

[tasks."e2e:swarm:triage:recording:test"]
description = "Run the recording-triage shell-wrapper test suite"
depends = ["monitor:tools:build:e2e"]
run = "./scripts/e2e/recording-triage/tests/run-all.sh"

[tasks."monitor:tools:build:perf"]
description = "Build the harness-monitor-perf Swift CLI (release)"
run = "swift build -c release --package-path apps/harness-monitor/Tools/HarnessMonitorPerf"

[tasks."monitor:tools:test:perf"]
description = "Run unit tests for the harness-monitor-perf Swift CLI"
run = "swift test --package-path apps/harness-monitor/Tools/HarnessMonitorPerf"

[tasks."monitor:audit:validation"]
description = "Run both Harness Monitor audit validation suites (wrapper scripts + Swift perf tool tests) in sequence with fail-fast"
run = '''
  set -e
  echo "==> monitor:audit:validation: running monitor:test:scripts"
  mise run monitor:test:scripts
  echo "==> monitor:audit:validation: running monitor:tools:test:perf"
  mise run monitor:tools:test:perf
  echo "==> monitor:audit:validation: both validation suites passed"
'''

[tasks."monitor:tools:generate:schemas"]
description = "Regenerate the HarnessMonitorPerf JSON schema snapshots"
depends = ["monitor:tools:build:perf"]
run = "apps/harness-monitor/Scripts/run-perf-tool.sh write-schemas --output-dir apps/harness-monitor/Tools/HarnessMonitorPerf/Schemas"

[tasks."monitor:tools:field-telemetry"]
description = "Normalize field telemetry JSON into audit-vocabulary field-telemetry.{json,md} (pass args after --)"
depends = ["monitor:tools:build:perf"]
run = "apps/harness-monitor/Scripts/run-perf-tool.sh field-telemetry-report"

[tasks."monitor:audit"]
description = "Run the Harness Monitor Instruments audit pipeline (pass audit args after --)"
depends = ["monitor:tools:build:perf"]
run = "apps/harness-monitor/Scripts/run-instruments-audit.sh"

[tasks."monitor:audit:from-ref"]
description = "Run the Harness Monitor Instruments audit pipeline from a temporary detached worktree (pass args after --)"
depends = ["monitor:tools:build:perf"]
run = "apps/harness-monitor/Scripts/run-instruments-audit-from-ref.sh"

[tasks."observability:start"]
description = "Start the local Grafana, Alloy, Tempo, Loki, and Prometheus stack and write the shared harness observability config"
run = "./scripts/observability.sh start"

[tasks."observability:stop"]
description = "Stop the local observability stack and remove the shared harness observability config"
run = "./scripts/observability.sh stop"

[tasks."observability:restart"]
description = "Restart the local observability stack"
run = "./scripts/observability.sh stop && ./scripts/observability.sh start"

[tasks."observability:status"]
description = "Show local observability stack status"
run = "./scripts/observability.sh status"

[tasks."observability:logs"]
description = "Tail local observability stack logs"
run = "./scripts/observability.sh logs"

[tasks."observability:open"]
description = "Open the local Grafana instance"
run = "./scripts/observability.sh open"

[tasks."observability:reset"]
description = "Stop the local observability stack, drop its Docker volumes, and remove the shared harness observability config"
run = "./scripts/observability.sh reset"

[tasks."observability:wipe"]
description = "Stop the local observability stack, drop its Docker volumes, and wipe the shared observability scratch state"
run = "./scripts/observability.sh wipe"

[tasks."observability:smoke"]
description = "Start the local observability stack, emit smoke telemetry, and verify traces, metrics, and logs arrive"
run = "./scripts/observability.sh smoke"

[tasks."observability:restore-smoke-stack-fixture"]
description = "Recreate the SQLite-mounted observability consumers after smoke fixture churn"
run = "./scripts/observability.sh --restore-smoke-stack-fixture"

[tasks."host-metrics:install"]
description = "Install and start macOS host metrics services (Alloy + darwin-exporter)"
run = "./scripts/host-metrics.sh install"

[tasks."host-metrics:uninstall"]
description = "Stop and remove macOS host metrics services"
run = "./scripts/host-metrics.sh uninstall"

[tasks."host-metrics:start"]
description = "Start macOS host metrics services"
run = "./scripts/host-metrics.sh start"

[tasks."host-metrics:stop"]
description = "Stop macOS host metrics services"
run = "./scripts/host-metrics.sh stop"

[tasks."host-metrics:restart"]
description = "Restart macOS host metrics services"
run = "./scripts/host-metrics.sh restart"

[tasks."host-metrics:status"]
description = "Show macOS host metrics service status and Prometheus targets"
run = "./scripts/host-metrics.sh status"

[tasks."host-metrics:metrics"]
description = "Query current macOS host metrics from Prometheus"
run = "./scripts/host-metrics.sh metrics"

[tasks."host-metrics:logs"]
description = "Show recent logs from macOS host metrics services"
run = "./scripts/host-metrics.sh logs"

[tasks."host-metrics:build-darwin-exporter"]
description = "Build darwin-exporter from vendor submodule"
run = "./scripts/host-metrics.sh build-darwin-exporter"

[tasks."mcp:test"]
description = "Run harness MCP server unit and integration tests"
run = [
  "./scripts/cargo-local.sh test --lib mcp::",
  "./scripts/cargo-local.sh test --test integration mcp:: -- --test-threads=1",
]

[tasks."mcp:test:registry"]
description = "Run the Harness Monitor registry Swift package tests"
run = "swift test --package-path mcp-servers/harness-monitor-registry"

[tasks."mcp:build:input-helper"]
description = "Build the harness-monitor-input Swift helper (CGEvent backend)"
run = "swift build -c release --package-path mcp-servers/harness-monitor-registry --product harness-monitor-input"

[tasks."mcp:build:monitor"]
description = "Build the Harness Monitor macOS app (Debug) with the MCP registry host wired in"
run = "apps/harness-monitor/Scripts/monitor-xcodebuild.sh -workspace apps/harness-monitor/HarnessMonitor.xcworkspace -scheme HarnessMonitor -configuration Debug -destination \"platform=macOS,arch=$(uname -m),name=My Mac\" -skipPackagePluginValidation build"

[tasks."mcp:launch:monitor"]
description = "Open the Debug build of Harness Monitor.app"
depends = ["mcp:build:monitor"]
run = "./scripts/mcp-launch-monitor.sh"

[tasks."mcp:install"]
description = "Full local MCP install: Rust CLI, Swift input helper, and Monitor.app Debug build"
depends = ["install", "mcp:build:input-helper", "mcp:build:monitor"]
run = "printf '\\nMCP install complete. Next steps:\\n  1. mise run mcp:launch:monitor\\n  2. Cmd+, -> MCP -> enable the toggle\\n  3. mise run mcp:smoke\\n'"

[tasks."mcp:socket-path"]
description = "Print the resolved accessibility socket path"
run = "./scripts/mcp-socket-path.sh"

[tasks."mcp:serve"]
description = "Run harness mcp serve on stdio (for manual debugging with MCP Inspector etc.)"
run = "harness mcp serve"

[tasks."mcp:smoke"]
description = "Drive harness mcp serve through initialize + tools/list (pass a tool name as arg to also tools/call it)"
run = "./scripts/mcp-smoke.sh"

[tasks."mcp:doctor"]
description = "Diagnose the local MCP setup: CLI, helper, Monitor.app, socket, protocol round-trip, .mcp.json"
run = "./scripts/mcp-doctor.sh"

[tasks."mcp:register-claude"]
description = "Idempotently register harness-monitor in repo-root .mcp.json (accepts add|remove|show as first arg)"
run = "./scripts/mcp-register-claude.sh"

[tasks."mcp:wait-socket"]
description = "Poll the registry socket until it is bound (accepts optional timeout in seconds, default 30)"
run = "./scripts/mcp-wait-socket.sh"

[tasks."mcp:launch:dev"]
description = "Launch Monitor.app (Debug) with HARNESS_MONITOR_MCP_FORCE_ENABLE=1 so the host starts automatically"
depends = ["mcp:build:monitor"]
run = "./scripts/mcp-launch-dev.sh"

[tasks."mcp:dev"]
description = "One-shot dev chain: install CLI, build helper + app, launch with force-enable, wait for socket, smoke test, register in .mcp.json"
depends = ["install", "mcp:build:input-helper", "mcp:build:monitor"]
run = [
  "./scripts/mcp-launch-dev.sh",
  "./scripts/mcp-wait-socket.sh 45",
  "./scripts/mcp-register-claude.sh add",
  "./scripts/mcp-smoke.sh list_windows",
]
