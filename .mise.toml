[tools]
rust = "nightly"

[tasks."check:stale"]
description = "Fail fast if the dev environment has stale processes, /tmp bridge sockets, or non-approved DerivedData HarnessMonitor bundles"
run = "./scripts/check-no-stale-state.sh"

[tasks."clean:stale"]
description = "Reset a polluted dev environment (quits Monitor, stops launchd daemon, kills orphan target/debug harness processes, wipes /tmp bridge sockets, stale bridge state, and non-approved DerivedData bundles)"
run = "./scripts/clean-stale-state.sh"

[tasks."version:show"]
description = "Print the canonical harness package version"
run = "./scripts/version.sh show"

[tasks."version:sync"]
description = "Sync all derived version surfaces from Cargo.toml"
run = "./scripts/version.sh sync"

[tasks."version:check"]
description = "Verify all derived version surfaces are in sync"
run = "./scripts/version.sh check"

[tasks."test:unit"]
description = "Run unit tests"
run = "./scripts/cargo-local.sh test --lib"

[tasks."test:integration"]
description = "Run integration tests (fast only, single-threaded for env safety)"
depends = ["check:stale"]
run = "./scripts/cargo-local.sh test --test integration -- --test-threads=1"

[tasks."test:slow"]
description = "Run ignored slow tests (fake toolchain, ENV_LOCK)"
depends = ["check:stale"]
run = "./scripts/cargo-local.sh test --test integration -- --ignored --test-threads=1"

[tasks.test]
description = "Run all fast tests"
depends = ["test:unit", "test:integration"]

[tasks.check]
description = "Type-check without building"
depends = ["check:stale"]
run = ["./scripts/version.sh check", "./scripts/cargo-local.sh check", "./scripts/cargo-local.sh clippy --lib"]

[tasks."lint:fix"]
description = "Format and apply clippy fixes"
run = ["cargo fmt", "./scripts/cargo-local.sh clippy --fix --allow-dirty --allow-staged"]

[tasks.install]
description = "Build release binary, sign it, install to ~/.local/bin, reconcile stale shadowed harness binaries on PATH, and validate the installed binary"
run = [
  "./scripts/cargo-local.sh build --release",
  "./scripts/install-harness-release.sh",
]

[tasks."cargo:env"]
description = "Print the local cargo wrapper environment used by mise tasks"
run = "./scripts/cargo-local.sh --print-env"

[tasks."harness-monitor:macos:generate"]
description = "Generate the Harness Monitor macOS Xcode project"
run = "apps/harness-monitor-macos/Scripts/generate-project.sh"

[tasks."harness-monitor:macos:lint"]
description = "Run the strict Swift format and build-tool-plugin quality gates for the Harness Monitor macOS app"
depends = ["check:stale"]
run = "apps/harness-monitor-macos/Scripts/run-quality-gates.sh"

[tasks."harness-monitor:macos:test"]
description = "Generate, lint, and test the Harness Monitor macOS app"
depends = ["check:stale"]
run = "apps/harness-monitor-macos/Scripts/test-swift.sh"
