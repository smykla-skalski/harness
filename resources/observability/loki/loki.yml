auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info
  grpc_server_max_concurrent_streams: 1000

common:
  instance_addr: 127.0.0.1
  path_prefix: /var/lib/loki
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory
  storage:
    filesystem:
      chunks_directory: /var/lib/loki/chunks
      rules_directory: /var/lib/loki/rules

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  allow_structured_metadata: true
  volume_enabled: true
  discover_log_levels: true

  # OTLP attribute mapping - controls which attributes become labels vs structured metadata
  otlp_config:
    # Resource attributes: service identity fields become stream labels (low cardinality)
    resource_attributes:
      attributes_config:
        - action: index_label
          attributes:
            - service.name
            - service.namespace
            - service.version
            - deployment.env
        # Drop high-cardinality resource attributes from index
        - action: drop
          attributes:
            - telemetry.sdk.name
            - telemetry.sdk.language
            - telemetry.sdk.version

    # Log attributes: low-cardinality operation fields become labels
    log_attributes:
      - action: index_label
        attributes:
          - http_method
          - http_route
          - hook_name
          - hook_event
          - outcome
          - http_status_code
          - error

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

pattern_ingester:
  enabled: true
  metric_aggregation:
    loki_address: 127.0.0.1:3100

ruler:
  alertmanager_url: http://127.0.0.1:9093

frontend:
  encoding: protobuf

compactor:
  working_directory: /var/lib/loki/compactor

analytics:
  reporting_enabled: false
