stream_over_http_enabled: true

server:
  http_listen_port: 3200
  log_level: info

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  trace_idle_period: 30s
  trace_live_period: 2m
  flush_check_period: 5s

query_frontend:
  metrics:
    max_duration: 24h

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: harness-local
  processor:
    local_blocks:
      filter_server_spans: false
      flush_to_storage: true
      trace_idle_period: 30s
      trace_live_period: 2m
      flush_check_period: 5s
  storage:
    path: /var/lib/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  traces_storage:
    path: /var/lib/tempo/generator/traces

storage:
  trace:
    backend: local
    local:
      path: /var/lib/tempo/blocks
    wal:
      path: /var/lib/tempo/wal

overrides:
  defaults:
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics
        - local-blocks
      generate_native_histograms: both

usage_report:
  reporting_enabled: false
