global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: alloy
    static_configs:
      - targets:
          - alloy:12345

  - job_name: tempo
    static_configs:
      - targets:
          - tempo:3200

  - job_name: loki
    static_configs:
      - targets:
          - loki:3100

  - job_name: sqlite-exporter
    static_configs:
      - targets:
          - sqlite-exporter:9560
