global:
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    cluster: harness-local
    environment: development

otlp:
  keep_identifying_resource_attributes: true
  promote_resource_attributes:
    - service.name
    - service.namespace
    - service.instance.id
    - service.version
    - deployment.environment
    - deployment.environment.name
    - deployment.env
    - host.name
  translation_strategy: UnderscoreEscapingWithSuffixes

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: alloy
    static_configs:
      - targets:
          - alloy:12345

  - job_name: tempo
    static_configs:
      - targets:
          - tempo:3200

  - job_name: loki
    static_configs:
      - targets:
          - loki:3100

  - job_name: sqlite-exporter
    static_configs:
      - targets:
          - sqlite-exporter:9560

  - job_name: copilot-token-exporter
    static_configs:
      - targets:
          - copilot-token-exporter:9561

  # macOS host metrics (darwin-exporter for battery, thermal, wifi).
  # host process metrics now arrive via OTLP push from the host Alloy OTel agent.
  - job_name: darwin-exporter
    static_configs:
      - targets:
          - host.docker.internal:10102
