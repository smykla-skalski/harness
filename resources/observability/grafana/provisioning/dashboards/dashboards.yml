apiVersion: 1

providers:
  - name: Harness Observability
    folder: Harness Observability
    folderUid: harness-observability
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/harness-observability
  - name: AI Agents Root
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/root
