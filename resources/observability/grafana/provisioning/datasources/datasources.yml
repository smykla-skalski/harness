apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: SQLite Daemon
    uid: sqlite-daemon
    type: frser-sqlite-datasource
    access: proxy
    editable: false
    jsonData:
      path: /srv/sqlite/daemon/harness.db
      pathOptions: mode=ro

  - name: SQLite Monitor
    uid: sqlite-monitor
    type: frser-sqlite-datasource
    access: proxy
    editable: false
    jsonData:
      path: /srv/sqlite/monitor/harness-cache.store
      pathOptions: mode=ro

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      httpHeaderName1: X-Scope-OrgID
      maxLines: 5000
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: trace_id=\"?([0-9a-f]{32})\"?
          name: TraceID
          url: ${__value.raw}
    secureJsonData:
      httpHeaderValue1: "1"

  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      nodeGraph:
        enabled: true
      search:
        hide: false
      serviceMap:
        datasourceUid: prometheus
      tracesToLogsV2:
        datasourceUid: loki
        customQuery: true
        filterByTraceID: true
        filterBySpanID: true
        spanStartTimeShift: -10m
        spanEndTimeShift: 10m
        query: '{service_name=~".+"} |= ""'
      tracesToMetrics:
        datasourceUid: prometheus
        spanStartTimeShift: -10m
        spanEndTimeShift: 10m
        queries:
          - name: Hook rate
            query: sum(rate(harness_hook_outcomes_total[5m]))
          - name: Daemon HTTP rate
            query: sum(rate(harness_daemon_http_requests_total[5m]))

  - name: Pyroscope
    uid: pyroscope
    type: grafana-pyroscope-datasource
    access: proxy
    url: http://pyroscope:4040
    editable: false

  - name: Tokio Console
    uid: tokio-console
    type: bsull-console-datasource
    access: proxy
    editable: false
    jsonData:
      url: "http://host.docker.internal:6669"
      retainFor: "6s"
