[security]
# admin credentials come from GF_SECURITY_ADMIN_* in the observability stack env

[news]
# disables "Latest from the blog" panel on home page
news_feed_enabled = false

[dashboards]
# sets AI Agents as the default home dashboard (skips welcome page)
default_home_dashboard_path = /var/lib/grafana/dashboards/root/ai-agents.json

[unified_alerting]
enabled = true

[alerting]
enabled = false

[panels]
disable_sanitize_html = true
