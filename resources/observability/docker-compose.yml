name: harness-observability

services:
  alloy:
    image: grafana/alloy:v1.16.0@sha256:6e00cf7c5a692ff5f24844529416ed017d76fce922f8199004e73d5eca46b6b8
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    restart: unless-stopped
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy/data
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
      - "127.0.0.1:12345:12345"
    depends_on:
      - tempo
      - loki
      - prometheus

  tempo:
    image: grafana/tempo:2.10.5@sha256:ee21727732c7a7199cb71c3eee9153bbf23f9b0b87619f0555a0cf21a67f1a33
    command:
      - -config.file=/etc/tempo/tempo.yml
    user: "0"
    restart: unless-stopped
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/lib/tempo
    ports:
      - "127.0.0.1:3200:3200"

  loki:
    image: grafana/loki:3.7.1@sha256:73e905b51a7f917f7a1075e4be68759df30226e03dcb3cd2213b989cc0dc8eb4
    command:
      - -config.file=/etc/loki/loki.yml
    user: "0"
    restart: unless-stopped
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/var/lib/loki
    ports:
      - "127.0.0.1:3100:3100"

  prometheus:
    image: prom/prometheus:v3.11.3@sha256:e4254400b85610324913f0dc4acf92603d9984e7519414c5a12811aa6146acc3
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --web.enable-remote-write-receiver
      - --web.enable-otlp-receiver
      - --enable-feature=otlp-deltatocumulative,exemplar-storage,native-histograms
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  sqlite-snapshot:
    image: python:3.14-alpine3.22
    command:
      - python3
      - /app/sync.py
      - --interval
      - "2"
    restart: unless-stopped
    volumes:
      - ./sqlite-snapshot/sync.py:/app/sync.py:ro
      - "${HARNESS_SQLITE_SOURCE_DAEMON_DIR}:/srv/source/daemon:ro"
      - "${HARNESS_SQLITE_SOURCE_MONITOR_DIR}:/srv/source/monitor:ro"
      - "${HARNESS_SQLITE_SNAPSHOT_DAEMON_DIR}:/srv/sqlite/daemon:rw"
      - "${HARNESS_SQLITE_SNAPSHOT_MONITOR_DIR}:/srv/sqlite/monitor:rw"

  sqlite-exporter:
    image: harness/sqlite-exporter:5.0.2-curl
    build:
      context: .
      dockerfile: ./query-exporter/Dockerfile
    command:
      - -p
      - "9560"
      - --process-stats
    restart: unless-stopped
    volumes:
      - ./query-exporter/config.yml:/config/config.yaml:ro
      - "${HARNESS_SQLITE_SNAPSHOT_DAEMON_DIR}:/srv/sqlite/daemon:ro"
      - "${HARNESS_SQLITE_SNAPSHOT_MONITOR_DIR}:/srv/sqlite/monitor:ro"
    ports:
      - "127.0.0.1:9560:9560"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9560/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - sqlite-snapshot

  copilot-token-exporter:
    image: python:3.14-alpine3.22
    command:
      - python3
      - /app/exporter.py
      - --tempo-url
      - http://tempo:3200
      - --listen-host
      - 0.0.0.0
      - --listen-port
      - "9561"
    restart: unless-stopped
    volumes:
      - ./copilot-token-exporter/exporter.py:/app/exporter.py:ro
      - copilot-token-exporter-data:/var/lib/copilot-token-exporter
    ports:
      - "127.0.0.1:9561:9561"
    healthcheck:
      test: ["CMD", "python3", "-c", "from urllib.request import urlopen; urlopen('http://localhost:9561/healthz', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - tempo

  pyroscope:
    image: grafana/pyroscope:2.0.1@sha256:704889ae04768d982a0a71935bb054948993ddc3fe80234611d20877ba8be4c9
    command:
      - -config.file=/etc/pyroscope/config.yaml
    restart: unless-stopped
    volumes:
      - ./pyroscope/config.yaml:/etc/pyroscope/config.yaml:ro
      - pyroscope-v2-data:/data
      - pyroscope-v2-compactor-data:/data-compactor
      - pyroscope-v2-metastore-data:/data-metastore
    ports:
      - "127.0.0.1:4040:4040"

  grafana:
    image: grafana/grafana:13.0.1@sha256:0f86bada30d65ef9d0183b90c1e2682ac92d53d95da8bed322b984ea78a4a73a
    user: "0"
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-harness}
      GF_USERS_DEFAULT_THEME: ${GF_USERS_DEFAULT_THEME:-light}
      GF_ALERTING_EMAIL_ADDRESSES: ${GF_ALERTING_EMAIL_ADDRESSES:-admin@localhost}
      GF_PLUGINS_PREINSTALL_SYNC: grafana-llm-app@1.0.8@https://grafana.com/api/plugins/grafana-llm-app/versions/1.0.8/download,frser-sqlite-datasource@4.0.2,bsull-console-datasource
    volumes:
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - "${HARNESS_SQLITE_SNAPSHOT_DAEMON_DIR}:/srv/sqlite/daemon:ro"
      - "${HARNESS_SQLITE_SNAPSHOT_MONITOR_DIR}:/srv/sqlite/monitor:ro"
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - tempo
      - loki
      - prometheus
      - sqlite-snapshot
      - sqlite-exporter
      - pyroscope

  grafana-init:
    image: alpine/curl:8.17.0
    restart: "no"
    environment:
      GRAFANA_URL: http://grafana:3000
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-harness}
    volumes:
      - ./grafana/init-star-dashboards.sh:/init-star-dashboards.sh:ro
    entrypoint: ["/bin/sh", "/init-star-dashboards.sh"]
    depends_on:
      grafana:
        condition: service_healthy

volumes:
  alloy-data:
    name: harness-observability_alloy-data
  tempo-data:
    name: harness-observability_tempo-data
  loki-data:
    name: harness-observability_loki-data
  prometheus-data:
    name: harness-observability_prometheus-data
  copilot-token-exporter-data:
    name: harness-observability_copilot-token-exporter-data
  pyroscope-v2-data:
    name: harness-observability_pyroscope-v2-data
  pyroscope-v2-compactor-data:
    name: harness-observability_pyroscope-v2-compactor-data
  pyroscope-v2-metastore-data:
    name: harness-observability_pyroscope-v2-metastore-data
  grafana-data:
    name: harness-observability_grafana-data
