services:
  alloy:
    image: grafana/alloy:v1.15.1@sha256:1f40cf52adda8fab3e058f9347a5d165624ecb9fbc1527769cb744748961940d
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    restart: unless-stopped
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy/data
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
      - "127.0.0.1:12345:12345"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:12345/-/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - tempo
      - loki
      - prometheus

  tempo:
    image: grafana/tempo:2.10.4@sha256:a6616c9d224770c883a67b50e4941e99c5df81b076ef05f516bb7cce5a96cec0
    command:
      - -config.file=/etc/tempo/tempo.yml
    user: "0"
    restart: unless-stopped
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/lib/tempo
    ports:
      - "127.0.0.1:3200:3200"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3200/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  loki:
    image: grafana/loki:3.7.1@sha256:73e905b51a7f917f7a1075e4be68759df30226e03dcb3cd2213b989cc0dc8eb4
    command:
      - -config.file=/etc/loki/loki.yml
    user: "0"
    restart: unless-stopped
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/var/lib/loki
    ports:
      - "127.0.0.1:3100:3100"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  prometheus:
    image: prom/prometheus:v3.11.2@sha256:5550dc63da361dc30f6fe02ac0e4dfc736ededfef3c8d12a634db04a67824d78
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --web.enable-remote-write-receiver
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  sqlite-exporter:
    image: adonato/query-exporter:2.11.1
    command:
      - -p
      - "9560"
      - --process-stats
    restart: unless-stopped
    volumes:
      - ./query-exporter/config.yml:/config/config.yaml:ro
      - "${HARNESS_SQLITE_EXPORTER_DAEMON_DIR}:/srv/sqlite/daemon:ro"
      - "${HARNESS_SQLITE_EXPORTER_MONITOR_DIR}:/srv/sqlite/monitor:ro"
    ports:
      - "127.0.0.1:9560:9560"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9560/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  pyroscope:
    image: grafana/pyroscope:1.21.0@sha256:751794786ee566c6b6200272546ba0200221c6c5660a03ca3b3b3d64d6b3d557
    command:
      - server
    restart: unless-stopped
    volumes:
      - pyroscope-data:/var/lib/pyroscope
    ports:
      - "127.0.0.1:4040:4040"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4040/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  grafana:
    image: grafana/grafana:13.0.1@sha256:0f86bada30d65ef9d0183b90c1e2682ac92d53d95da8bed322b984ea78a4a73a
    user: "0"
    restart: unless-stopped
    environment:
      GF_USERS_DEFAULT_THEME: ${GF_USERS_DEFAULT_THEME:-light}
      GF_PLUGINS_PREINSTALL_SYNC: grafana-llm-app@1.0.8@https://grafana.com/api/plugins/grafana-llm-app/versions/1.0.8/download,frser-sqlite-datasource@4.0.2,bsull-console-datasource
    volumes:
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - "${HARNESS_SQLITE_EXPORTER_DAEMON_DIR}:/srv/sqlite/daemon:rw"
      - "${HARNESS_SQLITE_EXPORTER_MONITOR_DIR}:/srv/sqlite/monitor:rw"
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - tempo
      - loki
      - prometheus
      - sqlite-exporter
      - pyroscope

  grafana-init:
    image: alpine/curl:8.12.1
    restart: "no"
    environment:
      GRAFANA_URL: http://grafana:3000
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-harness}
    volumes:
      - ./grafana/init-star-dashboards.sh:/init-star-dashboards.sh:ro
    entrypoint: ["/bin/sh", "/init-star-dashboards.sh"]
    depends_on:
      grafana:
        condition: service_healthy

volumes:
  alloy-data:
    name: harness-observability_alloy-data
  tempo-data:
    name: harness-observability_tempo-data
  loki-data:
    name: harness-observability_loki-data
  prometheus-data:
    name: harness-observability_prometheus-data
  pyroscope-data:
    name: harness-observability_pyroscope-data
  grafana-data:
    name: harness-observability_grafana-data
