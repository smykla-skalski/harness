name: HarnessMonitorUIPreviews
configs:
  Debug: debug
  Preview: debug
  Release: release
options:
  bundleIdPrefix: io.harnessmonitor
  createIntermediateGroups: true
settings:
  base:
    CLANG_TREAT_WARNINGS_AS_ERRORS: YES
    CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
    CODE_SIGNING_ALLOWED: YES
    DEAD_CODE_STRIPPING: YES
    ENABLE_HARDENED_RUNTIME: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    GENERATE_INFOPLIST_FILE: YES
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    SWIFT_ENABLE_EAGER_LINKING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    SWIFT_VERSION: "6.2"
  configs:
    Preview:
      COMPILER_INDEX_STORE_ENABLE: NO
      ENABLE_TESTABILITY: NO
      SWIFT_EMIT_LOC_STRINGS: NO
targets:
  HarnessMonitorKit:
    type: framework
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - Sources/HarnessMonitorKit
    dependencies:
      - sdk: SwiftData.framework
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: YES
        DEVELOPMENT_TEAM: Q498EB36N4
        ENABLE_MODULE_VERIFIER: YES
        MODULE_VERIFIER_SUPPORTED_LANGUAGES: "objective-c objective-c++"
        PRODUCT_BUNDLE_IDENTIFIER: io.harnessmonitor.kit
      configs:
        Preview:
          ENABLE_MODULE_VERIFIER: NO
  HarnessMonitorUI:
    type: framework
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - Sources/HarnessMonitorUI
    dependencies:
      - target: HarnessMonitorKit
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: YES
        DEVELOPMENT_TEAM: Q498EB36N4
        ENABLE_MODULE_VERIFIER: YES
        MODULE_VERIFIER_SUPPORTED_LANGUAGES: "objective-c objective-c++"
        PRODUCT_BUNDLE_IDENTIFIER: io.harnessmonitor.ui
      configs:
        Preview:
          ENABLE_MODULE_VERIFIER: NO
schemes:
  HarnessMonitorUIPreviews:
    build:
      config: Preview
      targets:
        HarnessMonitorUI: all
    run:
      config: Preview
    test:
      config: Preview
    analyze:
      config: Preview
