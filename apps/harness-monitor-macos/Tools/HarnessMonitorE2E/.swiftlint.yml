strict: true
lenient: false
reporter: xcode
excluded:
  - .build
disabled_rules:
  - trailing_comma
  - trailing_whitespace
  - opening_brace
opt_in_rules:
  - array_init
  - closure_spacing
  - collection_alignment
  - convenience_type
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - empty_count
  - empty_string
  - explicit_init
  - file_name_no_space
  - first_where
  - implicit_return
  - joined_default_parameter
  - modifier_order
  - operator_usage_whitespace
  - prefer_self_in_static_references
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_imports
  - sorted_first_last
  - toggle_bool
  - vertical_parameter_alignment_on_call
file_length:
  warning: 1500
  error: 2000
line_length:
  warning: 260
  error: 320
  ignores_comments: true
  ignores_function_declarations: true
function_body_length:
  warning: 350
  error: 500
type_body_length:
  warning: 800
  error: 1200
cyclomatic_complexity:
  warning: 25
  error: 40
nesting:
  function_level: 3
  type_level: 3
identifier_name:
  min_length:
    warning: 2
  max_length:
    warning: 60
    error: 80
  excluded:
    - id
    - ui
    - x
    - y
type_name:
  max_length:
    warning: 50
    error: 60
