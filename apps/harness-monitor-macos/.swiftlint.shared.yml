strict: true
lenient: false
reporter: xcode

disabled_rules:
  - trailing_comma
  - trailing_whitespace
  - opening_brace

# Keep explicit returns aligned with Apple swift-format's OmitExplicitReturns: false.
# Apple swift-format owns import ordering here because its lexicographic order differs from
# SwiftLint's `sorted_imports` rule for some module names.
opt_in_rules:
  - array_init
  - closure_spacing
  - collection_alignment
  - convenience_type
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - file_name_no_space
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - joined_default_parameter
  - last_where
  - modifier_order
  - operator_usage_whitespace
  - prefer_self_in_static_references
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - unowned_variable_capture
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call

file_length:
  warning: 420
  error: 520

type_name:
  max_length:
    warning: 50
    error: 60

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - ui
    - x
    - y

line_length:
  warning: 110
  error: 130
  ignores_comments: true
  ignores_function_declarations: true

function_body_length:
  warning: 90
  error: 130

type_body_length:
  warning: 380
  error: 520

nesting:
  function_level: 2
  type_level: 2
