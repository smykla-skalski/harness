name: HarnessMonitor
packages:
  SwiftLintPlugins:
    url: https://github.com/SimplyDanny/SwiftLintPlugins
    from: "0.58.0"
options:
  bundleIdPrefix: io.harness.monitor
  createIntermediateGroups: true
settings:
  base:
    CLANG_TREAT_WARNINGS_AS_ERRORS: YES
    CODE_SIGNING_ALLOWED: YES
    DEAD_CODE_STRIPPING: YES
    ENABLE_HARDENED_RUNTIME: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    GENERATE_INFOPLIST_FILE: YES
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    SWIFT_EMIT_LOC_STRINGS: YES
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    SWIFT_VERSION: "6.0"
targets:
  HarnessMonitorKit:
    type: framework
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - Sources/HarnessMonitorKit
    buildToolPlugins:
      - plugin: SwiftLintBuildToolPlugin
        package: SwiftLintPlugins
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: YES
        DEVELOPMENT_TEAM: Q498EB36N4
        ENABLE_MODULE_VERIFIER: YES
        MODULE_VERIFIER_SUPPORTED_LANGUAGES: "objective-c objective-c++"
        PRODUCT_BUNDLE_IDENTIFIER: io.harness.monitor.kit
  HarnessMonitor:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - Sources/HarnessMonitor
    dependencies:
      - target: HarnessMonitorKit
    entitlements:
      path: HarnessMonitor.entitlements
      properties:
        com.apple.security.network.client: true
        com.apple.security.network.server: true
        com.apple.security.cs.disable-library-validation: true
    buildToolPlugins:
      - plugin: SwiftLintBuildToolPlugin
        package: SwiftLintPlugins
    postBuildScripts:
      - name: Clear Gatekeeper Metadata
        basedOnDependencyAnalysis: false
        script: |
          strip_attrs() {
            local target_path="$1"
            if [ -e "$target_path" ]; then
              /usr/bin/xattr -dr com.apple.provenance "$target_path" 2>/dev/null || true
              /usr/bin/xattr -dr com.apple.quarantine "$target_path" 2>/dev/null || true
            fi
          }

          strip_attrs "$TARGET_BUILD_DIR/$FULL_PRODUCT_NAME"
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: HarnessMonitor.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: Q498EB36N4
        INFOPLIST_KEY_CFBundleDisplayName: Harness Monitor
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        PRODUCT_BUNDLE_IDENTIFIER: io.harness.monitor.app
  HarnessMonitorKitTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - Tests/HarnessMonitorKitTests
    dependencies:
      - target: HarnessMonitorKit
    buildToolPlugins:
      - plugin: SwiftLintBuildToolPlugin
        package: SwiftLintPlugins
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: Q498EB36N4
        PRODUCT_BUNDLE_IDENTIFIER: io.harness.monitor.kit-tests
  HarnessMonitorUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - Tests/HarnessMonitorUITests
    dependencies:
      - target: HarnessMonitor
    buildToolPlugins:
      - plugin: SwiftLintBuildToolPlugin
        package: SwiftLintPlugins
    postBuildScripts:
      - name: Clear Gatekeeper Metadata
        basedOnDependencyAnalysis: false
        script: |
          strip_attrs() {
            local target_path="$1"
            if [ -e "$target_path" ]; then
              /usr/bin/xattr -dr com.apple.provenance "$target_path" 2>/dev/null || true
              /usr/bin/xattr -dr com.apple.quarantine "$target_path" 2>/dev/null || true
            fi
          }

          strip_attrs "$TARGET_BUILD_DIR/$FULL_PRODUCT_NAME"

          for runner in "$BUILT_PRODUCTS_DIR"/*-Runner.app; do
            if [ -e "$runner" ]; then
              strip_attrs "$runner"
            fi
          done
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: Q498EB36N4
        PRODUCT_BUNDLE_IDENTIFIER: io.harness.monitor.ui-tests
        TEST_TARGET_NAME: HarnessMonitor
schemes:
  HarnessMonitor:
    build:
      targets:
        HarnessMonitor: all
        HarnessMonitorKit: all
    test:
      gatherCoverageData: true
      targets:
        - name: HarnessMonitorKitTests
        - name: HarnessMonitorUITests
