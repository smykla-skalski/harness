schemes:
  HarnessMonitor:
    build:
      targets:
        HarnessMonitor: all
        HarnessMonitorKit: all
        HarnessMonitorUIPreviewable: all
    run:
      environmentVariables:
        - variable: HARNESS_OTEL_EXPORT
          value: "1"
          isEnabled: true
        - variable: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://127.0.0.1:4317
          isEnabled: true
    test:
      gatherCoverageData: true
      environmentVariables:
        - variable: HARNESS_DAEMON_DATA_HOME
          value: /tmp/harness-monitor-tests
          isEnabled: true
      targets:
        - name: HarnessMonitorKitTests
        - name: HarnessMonitorUITests
  HarnessMonitor (External Daemon):
    build:
      targets:
        HarnessMonitor: all
        HarnessMonitorKit: all
        HarnessMonitorUIPreviewable: all
    run:
      environmentVariables:
        - variable: HARNESS_OTEL_EXPORT
          value: "1"
          isEnabled: true
        - variable: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://127.0.0.1:4317
          isEnabled: true
        - variable: HARNESS_MONITOR_EXTERNAL_DAEMON
          value: "1"
          isEnabled: true
        - variable: HARNESS_BOOTSTRAP_TIMEOUT_SECONDS
          value: "60"
          isEnabled: true
  HarnessMonitorAgentsE2E:
    build:
      targets:
        HarnessMonitor: all
        HarnessMonitorKit: all
        HarnessMonitorUIPreviewable: all
    test:
      gatherCoverageData: true
      targets:
        - name: HarnessMonitorAgentsE2ETests
  HarnessMonitorUIPreviewable:
    build:
      config: Preview
      targets:
        HarnessMonitorUIPreviewable: all
    run:
      config: Preview
    test:
      config: Preview
    analyze:
      config: Preview
  HarnessMonitorUIPreviews:
    build:
      config: Preview
      targets:
        HarnessMonitorPreviewHost: all
        HarnessMonitorUIPreviewable: all
        HarnessMonitorKit: all
