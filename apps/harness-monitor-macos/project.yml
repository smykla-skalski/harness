name: HarnessMonitor
configs:
  Debug: debug
  Preview: debug
  Release: release
options:
  bundleIdPrefix: io.harnessmonitor
  createIntermediateGroups: true
settings:
  base:
    CLANG_TREAT_WARNINGS_AS_ERRORS: YES
    CLANG_CXX_LANGUAGE_STANDARD: gnu++20
    CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
    CODE_SIGNING_ALLOWED: YES
    CURRENT_PROJECT_VERSION: 27.2.0
    DEAD_CODE_STRIPPING: YES
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_C_LANGUAGE_STANDARD: gnu17
    GENERATE_INFOPLIST_FILE: YES
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    SWIFT_EMIT_LOC_STRINGS: YES
    SWIFT_ENABLE_EAGER_LINKING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    SWIFT_VERSION: "6.2"
    HARNESS_MONITOR_APP_BUNDLE_ID: io.harnessmonitor.app
    HARNESS_MONITOR_BUILD_GIT_COMMIT: local-dev
    HARNESS_MONITOR_BUILD_GIT_DIRTY: false
    HARNESS_MONITOR_BUILD_WORKSPACE_FINGERPRINT: local-dev
    MARKETING_VERSION: 27.2.0
  configs:
    Preview:
      COMPILER_INDEX_STORE_ENABLE: NO
      ENABLE_TESTABILITY: NO
      ONLY_ACTIVE_ARCH: YES
      SWIFT_ENABLE_EAGER_LINKING: NO
      SWIFT_EMIT_LOC_STRINGS: NO
packages:
  Lottie:
    url: https://github.com/airbnb/lottie-ios
    majorVersion: 4.6.0
  OpenTelemetrySwift:
    url: https://github.com/open-telemetry/opentelemetry-swift
    exactVersion: 2.3.0
  OpenTelemetrySwiftCore:
    url: https://github.com/open-telemetry/opentelemetry-swift-core
    exactVersion: 2.4.1
  GRPCSwift:
    url: https://github.com/grpc/grpc-swift
    exactVersion: 1.27.0
  Textual:
    url: https://github.com/gonzalezreal/textual
    exactVersion: 0.3.1
  HarnessMonitorRegistry:
    path: ../../mcp-servers/harness-monitor-registry
targets:
  HarnessMonitorKit:
    type: framework
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - Sources/HarnessMonitorKit
      - Sources/HarnessMonitorKit/Support/HarnessMonitorTelemetry+Registration.swift
      - Sources/HarnessMonitorKit/Support/HarnessMonitorTelemetryRecorders.swift
    dependencies:
      - sdk: AppKit.framework
      - sdk: ApplicationServices.framework
      - sdk: AVFAudio.framework
      - sdk: CoreMedia.framework
      - sdk: SwiftData.framework
      - sdk: Speech.framework
      - sdk: IOKit.framework
      - sdk: ServiceManagement.framework
      - sdk: UserNotifications.framework
      - package: OpenTelemetrySwiftCore
        product: OpenTelemetryApi
      - package: OpenTelemetrySwiftCore
        product: OpenTelemetryConcurrency
      - package: OpenTelemetrySwiftCore
        product: OpenTelemetrySdk
      - package: OpenTelemetrySwift
        product: PersistenceExporter
      - package: OpenTelemetrySwift
        product: OpenTelemetryProtocolExporter
      - package: OpenTelemetrySwift
        product: OpenTelemetryProtocolExporterHTTP
      - package: GRPCSwift
        product: GRPC
      - package: HarnessMonitorRegistry
        product: HarnessMonitorRegistry
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: YES
        DEVELOPMENT_TEAM: Q498EB36N4
        ENABLE_MODULE_VERIFIER: YES
        MODULE_VERIFIER_SUPPORTED_LANGUAGES: "objective-c objective-c++"
        MODULE_VERIFIER_SUPPORTED_LANGUAGE_STANDARDS: "gnu17 gnu++20"
        PRODUCT_BUNDLE_IDENTIFIER: io.harnessmonitor.kit
      configs:
        Preview:
          ENABLE_MODULE_VERIFIER: NO
  HarnessMonitorUIPreviewable:
    type: framework
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - Sources/HarnessMonitorUIPreviewable
    dependencies:
      - target: HarnessMonitorKit
      - package: Textual
      - sdk: SwiftData.framework
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: YES
        DEVELOPMENT_TEAM: Q498EB36N4
        ENABLE_MODULE_VERIFIER: YES
        MODULE_VERIFIER_SUPPORTED_LANGUAGES: "objective-c objective-c++"
        MODULE_VERIFIER_SUPPORTED_LANGUAGE_STANDARDS: "gnu17 gnu++20"
        PRODUCT_BUNDLE_IDENTIFIER: io.harnessmonitor.ui.previewable
      configs:
        Preview:
          COMPILER_INDEX_STORE_ENABLE: NO
          ENABLE_MODULE_VERIFIER: NO
          ONLY_ACTIVE_ARCH: YES
          SWIFT_ENABLE_EAGER_LINKING: NO
  HarnessMonitorPreviewHost:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - Sources/HarnessMonitorPreviewHost
    dependencies:
      - target: HarnessMonitorKit
      - target: HarnessMonitorUIPreviewable
    entitlements:
      path: HarnessMonitorPreviewHost.entitlements
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: YES
        DEVELOPMENT_TEAM: Q498EB36N4
        PRODUCT_BUNDLE_IDENTIFIER: io.harnessmonitor.previews
        PRODUCT_NAME: HarnessMonitorPreviewHost
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_LSUIElement: YES
      configs:
        Preview:
          COMPILER_INDEX_STORE_ENABLE: NO
          ENABLE_MODULE_VERIFIER: NO
          ONLY_ACTIVE_ARCH: YES
          SWIFT_ENABLE_EAGER_LINKING: NO
  HarnessMonitor:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - Sources/HarnessMonitor
    resources:
      - Resources/PrivacyInfo.xcprivacy
    dependencies:
      - target: HarnessMonitorKit
      - target: HarnessMonitorUIPreviewable
      - package: Lottie
    postBuildScripts:
      - name: Bundle Daemon Agent
        basedOnDependencyAnalysis: false
        inputFiles:
          - $(PROJECT_DIR)/../../Cargo.toml
          - $(PROJECT_DIR)/../../Cargo.lock
          - $(PROJECT_DIR)/HarnessMonitorDaemon.entitlements
          - $(PROJECT_DIR)/Resources/LaunchAgents/io.harnessmonitor.daemon.Info.plist
          - $(PROJECT_DIR)/Resources/LaunchAgents/io.harnessmonitor.daemon.plist
          - $(PROJECT_DIR)/Scripts/bundle-daemon-agent.sh
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Helpers/harness
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Helpers/harness.cstemp
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Library/LaunchAgents/io.harnessmonitor.daemon.plist
        script: |
          /bin/bash "$PROJECT_DIR/Scripts/bundle-daemon-agent.sh"
      - name: Clear Gatekeeper Metadata
        basedOnDependencyAnalysis: false
        inputFiles:
          - $(PROJECT_DIR)/HarnessMonitor.entitlements
          - $(PROJECT_DIR)/HarnessMonitorDaemon.entitlements
          - $(PROJECT_DIR)/HarnessMonitor.xcodeproj/project.pbxproj
          - $(PROJECT_DIR)/Resources
          - $(PROJECT_DIR)/Scripts/bundle-daemon-agent.sh
          - $(PROJECT_DIR)/Scripts/run-xcode-build-server.sh
          - $(PROJECT_DIR)/Sources/HarnessMonitor
          - $(PROJECT_DIR)/Sources/HarnessMonitorKit
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/HarnessMonitorBuildProvenance.plist
        script: |
          set -eu

          if [ "${XCODE_RUNNING_FOR_PREVIEWS:-}" = "1" ] || [[ "${BUILD_DIR:-}" == *"/Previews/"* ]]; then
            exit 0
          fi

          resolve_repo_root() {
            local candidate="$PROJECT_DIR"
            while [ "$candidate" != "/" ]; do
              if [ -d "$candidate/.git" ]; then
                printf '%s\n' "$candidate"
                return
              fi
              candidate="$(dirname "$candidate")"
            done
            printf '%s\n' "$PROJECT_DIR"
          }

          workspace_tree_fingerprint() {
            python3 - "$PROJECT_DIR" <<'PY'
          from __future__ import annotations

          import hashlib
          import sys
          from pathlib import Path

          root = Path(sys.argv[1])
          include_paths = [
              root / "HarnessMonitor.entitlements",
              root / "HarnessMonitorDaemon.entitlements",
              root / "HarnessMonitor.xcodeproj" / "project.pbxproj",
              root / "Resources",
              root / "Scripts" / "bundle-daemon-agent.sh",
              root / "Scripts" / "run-xcode-build-server.sh",
              root / "Sources" / "HarnessMonitor",
              root / "Sources" / "HarnessMonitorKit",
              root / "Sources" / "HarnessMonitorUIPreviewable",
          ]
          digest = hashlib.sha256()

          for include_path in include_paths:
              if not include_path.exists():
                  continue

              if include_path.is_file():
                  file_paths = [include_path]
              else:
                  file_paths = sorted(
                      candidate for candidate in include_path.rglob("*") if candidate.is_file()
                  )

              for file_path in file_paths:
                  relative_path = file_path.relative_to(root).as_posix()
                  digest.update(relative_path.encode("utf-8"))
                  digest.update(b"\0")
                  with file_path.open("rb") as handle:
                      for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                          digest.update(chunk)
                  digest.update(b"\0")

          print(digest.hexdigest())
          PY
          }

          repo_root="$(resolve_repo_root)"
          build_commit="${HARNESS_MONITOR_BUILD_GIT_COMMIT:-}"
          if [ -z "$build_commit" ]; then
            build_commit="$(git -C "$repo_root" rev-parse HEAD 2>/dev/null || printf 'unknown')"
          fi

          build_dirty="${HARNESS_MONITOR_BUILD_GIT_DIRTY:-}"
          if [ -z "$build_dirty" ]; then
            if [ -n "$(git -C "$repo_root" status --short 2>/dev/null || true)" ]; then
              build_dirty="true"
            else
              build_dirty="false"
            fi
          fi

          build_workspace_fingerprint="${HARNESS_MONITOR_BUILD_WORKSPACE_FINGERPRINT:-}"
          if [ -z "$build_workspace_fingerprint" ]; then
            if [ "${ENABLE_USER_SCRIPT_SANDBOXING:-}" = "YES" ]; then
              build_workspace_fingerprint="unavailable-user-script-sandbox"
            else
              build_workspace_fingerprint="$(workspace_tree_fingerprint)"
            fi
          fi

          build_started_at_utc="${HARNESS_MONITOR_BUILD_STARTED_AT_UTC:-}"
          if [ -z "$build_started_at_utc" ]; then
            build_started_at_utc="$(TZ=UTC /bin/date +%Y-%m-%dT%H:%M:%SZ)"
          fi

          write_build_provenance() {
            local provenance_path="${SCRIPT_OUTPUT_FILE_0:-$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/HarnessMonitorBuildProvenance.plist}"
            local resources_dir
            resources_dir="$(dirname "$provenance_path")"

            /bin/mkdir -p "$resources_dir"
            /bin/cat > "$provenance_path" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>HarnessMonitorBuildGitCommit</key>
            <string>${build_commit}</string>
            <key>HarnessMonitorBuildGitDirty</key>
            <string>${build_dirty}</string>
            <key>HarnessMonitorBuildWorkspaceFingerprint</key>
            <string>${build_workspace_fingerprint}</string>
            <key>HarnessMonitorBuildStartedAtUTC</key>
            <string>${build_started_at_utc}</string>
          </dict>
          </plist>
          EOF
          }

          strip_attrs() {
            local target_path="$1"
            if [ -e "$target_path" ]; then
              /usr/bin/xattr -dr com.apple.provenance "$target_path" 2>/dev/null || true
              /usr/bin/xattr -dr com.apple.quarantine "$target_path" 2>/dev/null || true
            fi
          }

          write_build_provenance
          strip_attrs "$TARGET_BUILD_DIR/$FULL_PRODUCT_NAME"
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: HarnessMonitor.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: Q498EB36N4
        ENABLE_APP_SANDBOX: YES
        ENABLE_INCOMING_NETWORK_CONNECTIONS: NO
        ENABLE_OUTGOING_NETWORK_CONNECTIONS: YES
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Resources/HarnessMonitor-Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: $(HARNESS_MONITOR_APP_BUNDLE_ID)
        PRODUCT_NAME: Harness Monitor
