excluded:
  - HarnessMonitor.xcodeproj
  - .build
  - build
  - DerivedData
reporter: xcode
strict: true
lenient: false
disabled_rules:
  - trailing_comma
  - trailing_whitespace
opt_in_rules:
  - array_init
  - closure_spacing
  - collection_alignment
  - convenience_type
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - empty_count
  - empty_string
  - explicit_init
  - file_name_no_space
  - first_where
  - implicit_return
  - joined_default_parameter
  - modifier_order
  - multiline_arguments
  - multiline_parameters
  - operator_usage_whitespace
  - prefer_self_in_static_references
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - vertical_parameter_alignment_on_call
identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - ui
    - x
    - y
line_length:
  warning: 110
  error: 130
  ignores_comments: true
  ignores_function_declarations: true
function_body_length:
  warning: 80
  error: 120
type_body_length:
  warning: 300
  error: 450
nesting:
  function_level: 2
  type_level: 2
