parent_config: ../../.swiftlint.shared.yml

excluded:
  - .build

file_length:
  warning: 1450
  error: 1800

line_length:
  warning: 160
  error: 200
  ignores_comments: true
  ignores_function_declarations: true

function_body_length:
  warning: 340
  error: 450

type_body_length:
  warning: 600
  error: 900

cyclomatic_complexity:
  warning: 18
  error: 30

nesting:
  function_level: 3
  type_level: 3

identifier_name:
  min_length:
    warning: 2
  max_length:
    warning: 60
    error: 80
  excluded:
    - id
    - ui
    - x
    - y

type_name:
  max_length:
    warning: 50
    error: 60
